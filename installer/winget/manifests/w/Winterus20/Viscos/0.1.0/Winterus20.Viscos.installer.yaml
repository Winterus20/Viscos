# Viscos WinGet manifest template (microsoft/winget-pkgs schema)
#
# Schema: https://github.com/microsoft/winget-pkgs/tree/master/manifestSchema
# Real SHA256 generated by release.yml after build (replace REPLACE_WITH_BUILD_HASH_WEBVIEW2).
#
# PR submission flow (humans only):
#   1. Fork microsoft/winget-pkgs.
#   2. Copy this template to manifests/w/Winterus20/Viscos/<version>/.
#   3. Generate version manifest (Winterus20.Viscos.yaml) + locale manifest (Winterus20.Viscos.locale.en-US.yaml).
#   4. Replace REPLACE_WITH_BUILD_HASH_WEBVIEW2 with actual SHA256 from release.yml artifact.
#   5. Open PR to microsoft/winget-pkgs.
#   6. Wait Microsoft Reviewer approval (1-2 weeks typical).
#
# Two parallel installers:
#   - viscos-webview2.msi (~25 MB, Win10 default)
#   - viscos-cef.msi (~250 MB, Win11 default)
# This template references the webview2 installer. Duplicate for Cef variant
# with separate PackageVersion (e.g. Winterus20.Viscos.cef.yaml).

PackageIdentifier: Winterus20.Viscos
PackageVersion: 0.1.0
PackageLocale: en-US
Publisher: Winterus20
PackageName: Viscos
License: GPL-3.0
ShortDescription: Viscos is an unofficial Discord client with native shell + WebView2/CEF backend.
Description: |-
  Viscos is a lightweight Discord client built with Rust + iced + WebView2/CEF. Features
  native side panel, hotkey support (Ctrl+Shift+M/D), telemetry-driven CEF recommendation,
  and Microsoft WebView2 GDI leak mitigation. Targets Windows 10/11 x64.

  Viscos, Discord'un **resmi olmayan** bir istemcisidir. Kullanıcı kendi hesabıyla giriş
  yapar; ToS ihlali (otomasyon, scraping, mass DM) **bu istemcinin tasarım amacı değildir**
  ve tüm sorumluluk kullanıcıya aittir. Discord multi-layered detection (fingerprint +
  behavioral heuristics) ile self-bot tespit edip banlayabilir.
Moniker: viscos
Tags:
  - discord
  - chat
  - messaging
  - rust
  - native
  - webview2
InstallerType: msi
Architecture: x64
InstallScope: perMachine
InstallModes:
  - interactive
  - silent
  - silentWithProgress
UpgradeBehavior: install
ManifestType: installer
ManifestVersion: 1.6.0

# ─── Installer metadata (WebView2 variant) ─────────────────────
# For the Cef variant, duplicate this template with PackageVersion
# 0.1.0-cef and InstallerSha256 = REPLACE_WITH_BUILD_HASH_CEF.

InstallerUrl: https://github.com/Winterus20/Viscos/releases/download/v0.1.0/viscos-webview2-0.1.0-x86_64.msi
InstallerSha256: REPLACE_WITH_BUILD_HASH_WEBVIEW2

# ─── Installer switches (Faz 8.0 standard) ─────────────────────
# silent:    /qn
# silentWithProgress: /qb! (show progress bar, no modal prompts)
# interactive: default UI flow

Installers:
  - Architecture: x64
    InstallerType: msi
    InstallerUrl: https://github.com/Winterus20/Viscos/releases/download/v0.1.0/viscos-webview2-0.1.0-x86_64.msi
    InstallerSha256: REPLACE_WITH_BUILD_HASH_WEBVIEW2

# ─── Locale manifest reference ─────────────────────────────────
# Locale manifest (Winterus20.Viscos.locale.en-US.yaml) lives in same
# directory. Generate from this template + locale-specific strings.

# ─── Notes ─────────────────────────────────────────────────────
# Real SHA256 generated by release.yml `winget-manifest` job after
# tag push (v0.1.0). The job computes SHA256 from target/release/
# viscos-webview2-0.1.0-x86_64.msi and rewrites the placeholder.
# Commit this template to fork microsoft/winget-pkgs via PR (humans only).
